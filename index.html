<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anton Nouveau</title>
<link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background: #000;
            color: #00ff00;
            overflow: hidden;
            height: 100vh;
        }

        /* CRT Effects */
        .crt {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: pulse 0.11s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.27861; }
            5% { opacity: 0.34769; }
            10% { opacity: 0.23604; }
            15% { opacity: 0.90626; }
            20% { opacity: 0.18128; }
            25% { opacity: 0.83891; }
            30% { opacity: 0.65583; }
            35% { opacity: 0.67807; }
            40% { opacity: 0.26559; }
            45% { opacity: 0.84693; }
            50% { opacity: 0.96019; }
            55% { opacity: 0.08594; }
            60% { opacity: 0.20313; }
            65% { opacity: 0.71988; }
            70% { opacity: 0.53455; }
            75% { opacity: 0.37288; }
            80% { opacity: 0.71428; }
            85% { opacity: 0.70419; }
            90% { opacity: 0.7003; }
            95% { opacity: 0.36108; }
            100% { opacity: 0.24387; }
        }

        @keyframes pulse {
            0% { opacity: 0.1; }
            50% { opacity: 0.05; }
            100% { opacity: 0.1; }
        }

        /* Boot Screen */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #00ff00;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            font-size: 20px;
            z-index: 10000;
            line-height: 1.6;
        }

        #boot-screen.hidden {
            display: none;
        }

        .boot-line {
            opacity: 0;
            animation: typeIn 0.1s forwards;
        }

        @keyframes typeIn {
            to { opacity: 1; }
        }

        /* Desktop */
        #desktop {
            display: none;
            width: 100%;
            height: 100vh;
            background: #000;
            position: relative;
            overflow: hidden;
            justify-content: center;
            align-items: center;
        }

        #desktop.active {
            display: flex;
        }

        .coming-soon {
            text-align: center;
            padding: 40px;
        }

        .coming-soon h1 {
            font-size: clamp(64px, 10vw, 120px);
            margin-bottom: 30px;
            letter-spacing: 0.05em;
        }

        .coming-soon h2 {
            font-size: clamp(32px, 5vw, 56px);
            color: #00ff00;
            margin-bottom: 40px;
        }

        .coming-soon .contact {
            font-size: 24px;
            margin-top: 60px;
            color: #00ff00;
            opacity: 0.7;
        }

        .coming-soon .contact a {
            color: #00ff00;
            text-decoration: none;
            border-bottom: 1px solid #00ff00;
        }

        .coming-soon .contact a:hover {
            opacity: 0.8;
        }

        /* Taskbar */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: #001100;
            border-top: 2px solid #00ff00;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-size: 20px;
            z-index: 1000;
        }

        .system-status {
            display: flex;
            gap: 30px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            background: #00ff00;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        /* Responsive */
        @media (max-width: 640px) {
            #boot-screen {
                padding: 24px;
                font-size: 16px;
            }

            .coming-soon {
                padding: 24px;
            }

            .taskbar {
                font-size: 16px;
                padding: 0 16px;
            }

            .system-status {
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="crt"></div>

    <!-- Boot Screen -->
    <div id="boot-screen">
        <div id="boot-text"></div>
    </div>

    <!-- Desktop -->
    <div id="desktop">
        <div class="coming-soon">
            <h1>ANTON NOUVEAU</h1>
            <h2>COMING 2026</h2>
            <div class="contact">
                <a href="mailto:mgmt@antonnouveau.com">mgmt@antonnouveau.com</a>
            </div>
        </div>

        <!-- Taskbar -->
        <div class="taskbar">
            <div style="font-size: 24px;">ANTON NOUVEAU TERMINAL</div>
            <div class="system-status">
                <div class="status-item">
                    <div class="status-indicator"></div>
                    <span>SYSTEM: STANDBY</span>
                </div>
                <div class="status-item">
                    <span id="system-time">1989-11-09 23:47</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Boot sequence
        const bootMessages = [
            'ANTON NOUVEAU TERMINAL SYSTEM',
            'AUDIO INTERFACE v2.3.1',
            '',
            'BIOS DATE: 11/09/89 18:47:12',
            'PROCESSOR: VINTAGE @ 10 MHz',
            'MEMORY TEST: 640K OK',
            '',
            'Initializing audio protocols...',
            'Loading project database...',
            'Connecting to server...',
            'WARNING: Connection unstable',
            'WARNING: System integrity compromised',
            '',
            'User verification: BYPASSED',
            'Access level: GUEST',
            '',
            'Boot complete.',
            ''
        ];

        let bootIndex = 0;
        const bootText = document.getElementById('boot-text');
        const bootScreen = document.getElementById('boot-screen');
        const desktop = document.getElementById('desktop');

        function bootSequence() {
            if (bootIndex < bootMessages.length) {
                const line = document.createElement('div');
                line.className = 'boot-line';
                line.textContent = bootMessages[bootIndex];
                bootText.appendChild(line);
                bootIndex++;
                
                const delay = Math.random() * 200 + 100;
                setTimeout(bootSequence, delay);
            } else {
                setTimeout(() => {
                    bootScreen.classList.add('hidden');
                    desktop.classList.add('active');
                    startTime();
                }, 1000);
            }
        }

        // Time glitches
        function startTime() {
            setInterval(() => {
                if (Math.random() < 0.1) {
                    const years = ['1989', '1990', '1991', '1987'];
                    const year = years[Math.floor(Math.random() * years.length)];
                    document.getElementById('system-time').textContent = `${year}-${String(Math.floor(Math.random() * 12) + 1).padStart(2, '0')}-${String(Math.floor(Math.random() * 28) + 1).padStart(2, '0')} ${String(Math.floor(Math.random() * 24)).padStart(2, '0')}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}`;
                }
            }, 5000);
        }

        // Start boot
        setTimeout(bootSequence, 500);
    </script>
</body>
</html>
